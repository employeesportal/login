<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Employee Self Service Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#003366,#0056b3,#00a8ff);
    overflow:hidden;
}

/* Background Circles */
body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
}

body::before{
    width:300px;
    height:300px;
    top:-100px;
    left:-100px;
}

body::after{
    width:400px;
    height:400px;
    bottom:-150px;
    right:-150px;
}

.card{
    width:700px;
    max-width:90%;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.3);
    border-radius:20px;
    padding:35px;
    text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,.25);
    color:white;
    z-index:10;
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h1{
    font-size:34px;
    margin-bottom:10px;
    letter-spacing:1px;
}

.company{
    font-size:18px;
    margin-bottom:15px;
    opacity:.95;
}

.tagline{
    font-size:15px;
    color:#f1f1f1;
    margin-bottom:25px;
}

.hero-image{
    width:250px;
    margin:15px auto 25px;
    display:block;
}

.portal-btn{
    display:inline-block;
    padding:15px 35px;
    background:#ffffff;
    color:#003366;
    text-decoration:none;
    border-radius:50px;
    font-size:18px;
    font-weight:600;
    transition:0.3s;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.portal-btn:hover{
    transform:translateY(-3px);
    background:#ffcc00;
    color:#003366;
}

.dateTimeBox{
    margin-top:25px;
    padding:15px;
    border-radius:10px;
    background:rgba(255,255,255,.15);
}

.dateTimeBox p{
    margin:5px 0;
    font-size:17px;
    font-weight:500;
}

.footer{
    margin-top:20px;
    font-size:13px;
    opacity:0.9;
}

@media(max-width:600px){

    h1{
        font-size:26px;
    }

    .hero-image{
        width:180px;
    }

    .portal-btn{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="card">

    <!-- Company Logo -->
    <img src="https://static.vecteezy.com/system/resources/thumbnails/051/960/739/small/business-cartoon-portrait-of-a-man-in-a-suit-and-red-tie-ideal-for-professional-use-corporate-identity-or-office-decor-png.png"
         class="hero-image"
         alt="Logo">

    <h1>EMPLOYEE PORTAL</h1>

    <div class="company">
        Welcome to Your Workplace Portal
    </div>

    <div class="tagline">
        Attendance • Leave Management • Employee Self Service
    </div>

    <!-- Employee Illustration -->
   

    <a class="portal-btn"
       href="https://script.google.com/macros/s/AKfycbwSVPrwRa_wmzktkpFeyGUkJMljDPoB3JxCA9XABDxXU1csByn-YxUW38GF_MLbdva3/exec"
       target="_blank">
       🚀 Open Employee Portal
    </a>

    <div class="dateTimeBox">
        <p id="currentDate"></p>
        <p id="currentTime"></p>
    </div>

    <div class="footer">
        © 2026 Employee Self Service Portal | All Rights Reserved | Creator
    </div>

</div>

<script>

function updateDateTime() {

    const now = new Date();

    const date = now.toLocaleDateString('en-GB',{
        weekday:'long',
        day:'2-digit',
        month:'long',
        year:'numeric'
    });

    const time = now.toLocaleTimeString('en-GB',{
        hour12:false
    });

    document.getElementById("currentDate").innerHTML =
        "📅 " + date;

    document.getElementById("currentTime").innerHTML =
        "⏰ " + time;
}

updateDateTime();
setInterval(updateDateTime,1000);

</script>

</body>
</html>
